version: 2.0

defaultLocaleCode: en-US
localeCodes:
  - en-US

awsAccountConfig:
  accountSources:
    - workshop_studio
  regionConfiguration:
    deployableRegions:
      required:
        - us-east-1
    minAccessibleRegions: 1
    maxAccessibleRegions: 3
    accessibleRegions:
      required:
        - us-east-1
  participantRole:
    managedPolicies:
      - "arn:aws:iam::aws:policy/AmazonSQSFullAccess"
      - "arn:aws:iam::aws:policy/AmazonBedrockFullAccess"
    iamPolicies:
      - static/templates/custom-iam-policy.json

infrastructure:
  cloudformationTemplates:
    - templateLocation: static/templates/astro-aws-workshop-cfn.yaml
      label: astro-airflow-workshop

additionalLinks:
  - title: "Astronomer Airflow Docs"
    link: "https://www.astronomer.io/docs/"
  - title: "Astronomer Learn Guides for Airflow"
    link: "https://www.astronomer.io/docs/learn"
  - title: "Apache Airflow Documentation"
    link: "https://airflow.apache.org/docs/"

params:
  workshopTitle: "Play Astro"
  duration: "1-2 hours"
  level: "200"
  services:
    - "Apache Airflow"
    - "Astronomer"
    - "Astro IDE"
    - "Amazon SQS"
    - "Amazon Bedrock"