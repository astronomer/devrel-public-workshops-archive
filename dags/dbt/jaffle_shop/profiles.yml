bq_profile:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID', 'airflowintegrations') }}"
      dataset: "{{ env_var('BIGQUERY_DATASET', 'afs2025_schema_60') }}"
      threads: 16 # Must be a value of 1 or greater
      keyfile:  "{{ env_var('BQ_KEYFILE_PATH', '/usr/local/airflow/include/key.json') }}"
      OPTIONAL_CONFIG: VALUE
